<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<title>Weekly Assignment 11</title>

		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.1.0/reset.min.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.1.0/reveal.min.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.1.0/theme/moon.min.css" id="theme">

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.1.0/plugin/highlight/monokai.min.css" id="highlight-theme">

		<script src="https://cdn.jsdelivr.net/npm/vega@3"></script>
		<script src="https://cdn.jsdelivr.net/npm/vega-lite@2"></script>
		<script src="https://cdn.jsdelivr.net/npm/vega-embed@3"></script>
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
				<section>
					<h3>Stocks</h3>
					<p>INFO 3402, Spring 2021, Week 13</p>
				</section>

				<section>
					<div id="vis01"></div>
						<script type="text/javascript">
						var spec = {
							"$schema": "https://vega.github.io/schema/vega-lite/v5.json",
							"description": "Multi-series line chart with labels and interactive highlight on hover.  We also set the selection's initial value to provide a better screenshot",
							"width": 400,
							"background": "white",
							"data": {
								"url": "https://vega.github.io/vega-datasets/data/stocks.csv"},
							"transform": [{
								"filter": "datum.symbol!=='IBM'"
							}],
							"encoding": {
								"x": {
									"field": "date", 
									"type": "temporal", 
									"title": "date"
								},
								"y": {
									"field": "price",
									"type": "quantitative",
									"title": "price"
								},
								"color": {
									"condition": {
										"param": "hover",
										"field":"symbol",
										"type":"nominal",
										"legend": null
									},
									"value": "grey"
								},
								"opacity": {
									"condition": {
										"param": "hover",
										"value": 1
									},
									"value": 0.2
								}
							},
							"layer": [{
								"description": "transparent layer to make it easier to trigger selection",
								"params": [{
									"name": "hover",
									"value": [{"symbol": "GOOG"}],
									"select": {
										"type": "point",
										"fields": ["symbol"],
										"on": "mouseover"
									}
								}],
								"mark": {
									"type": "line",
									"strokeWidth": 10,
									"stroke": "transparent"
								}
							}, {
								"mark": "line"
							}, {
								"encoding": {
									"x": {
										"aggregate": "max",
										"field": "date"
									},
									"y": {
										"aggregate": {
											"argmax": "date"
										}, 
										"field": "price"
									}
								},
								"layer": [{
									"mark": {
										"type": "circle"
									}
								}, {
									"mark": {
										"type": "text", 
										"align": "left", 
										"dx": 4
									},
									"encoding": {
										"text": {
											"field":"symbol",
											"type": "nominal"
										}
									}
								}]
							}],
							"config": {
								"view": {
									"stroke": null
								}
							}
						};
						var opt = {"renderer": "canvas", "actions": false};
						vegaEmbed("#vis01", spec, opt);
						</script>
					<!--Vega visualization goes here-->
				</section>

				<section>
					<p>Code</p>
				</section>
			</div>
		</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.1.0/reveal.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.1.0/plugin/highlight/highlight.min.js"></script>
		<script>
			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,
				slideNumber: 'h/v',
				// Learn about plugins: https://revealjs.com/plugins/
				plugins: [ RevealHighlight ]
			});
		</script>
	</body>
</html>
